# Default selection mode for all channels unless overridden
# Options: "random" | "cycle"
default_selection_mode: "random"

# Skip country-specific bank holidays globally.
# Uses ISO 3166 country codes. Supports subdivisions (e.g. "US-CA", "DE-BY").
# See: https://github.com/vacanza/python-holidays
# skip_holidays: "US"

# Skip weekends globally. Can also be set per channel entry.
# skip_weekends: true

# Global skip dates (YYYY-MM-DD). Messages will not be sent on these dates.
skip_dates:
  - "2026-12-25"
  - "2026-01-01"

channels:
  - id: "C1234567890"
    name: "standup"

    skip_weekends: true
    # skip_holidays: "US-CA"  # Skip California state holidays too

    messages:
      - "Good morning team! Ready for {day_of_week}."
      - "Morning all! Let's have a great {day_of_week}."
      - "Hey team, online and ready. Today is {date}."

    selection_mode: "cycle"

    schedules:
      - cron: "0 9 * * 1-5"
        jitter_minutes: 15

  - id: "C0987654321"
    name: "random-chat"

    messages:
      - "Anyone up for a virtual coffee?"
      - "Happy {day_of_week}!"

    schedules:
      - cron: "0 14 * * 3"
        jitter_minutes: 30
